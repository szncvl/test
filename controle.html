<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Controle de Excursão</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0a0a0c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: #1a1a1c;
            border-radius: 32px;
            padding: 24px 20px;
            border: 1px solid #2c2c2e;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.8);
        }

        h1 {
            color: #ffffff;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .subtitulo {
            color: #98989e;
            font-size: 1rem;
            margin-bottom: 24px;
            border-bottom: 1px solid #2c2c2e;
            padding-bottom: 16px;
        }

        .total-inicial {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #232325;
            padding: 16px 20px;
            border-radius: 40px;
            margin-bottom: 24px;
            border: 1px solid #3a3a3c;
        }

        .total-label {
            color: #ffffff;
            font-size: 1.2rem;
        }

        .total-valor {
            background: #30d158;
            color: #000000;
            font-size: 2rem;
            font-weight: 700;
            padding: 4px 24px;
            border-radius: 40px;
        }

        .monitora-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #232325;
            padding: 12px 20px;
            border-radius: 40px;
            margin-bottom: 24px;
            border: 1px solid #3a3a3c;
        }

        .monitora-nome strong {
            color: #ffffff;
            font-size: 1.3rem;
        }

        .botao-alterar {
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: #98989e;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }

        .tabela-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1.2fr 1.5fr;
            background: #2c2c2e;
            padding: 12px 16px;
            border-radius: 20px 20px 12px 12px;
            margin-bottom: 4px;
            border: 1px solid #3a3a3c;
        }

        .tabela-header span {
            color: #ffffff;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .tabela-container {
            background: #1c1c1e;
            border-radius: 12px;
            border: 1px solid #3a3a3c;
            margin-bottom: 24px;
            min-height: 300px;
            padding: 8px 0;
        }

        .linha-tabela {
            display: grid;
            grid-template-columns: 2fr 1fr 1.2fr 1.5fr;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #2c2c2e;
        }

        .linha-tabela:last-child {
            border-bottom: none;
        }

        .familia {
            color: #ffffff;
            font-weight: 500;
        }

        .membros-input {
            background: #2c2c2e;
            border: 2px solid #3a3a3c;
            border-radius: 30px;
            padding: 8px;
            width: 70px;
            color: #ffffff;
            text-align: center;
            font-weight: 600;
            outline: none;
        }

        .membros-input:focus {
            border-color: #30d158;
        }

        .restante {
            color: #30d158;
            font-weight: 600;
        }

        .monitora {
            color: #98989e;
        }

        .botoes {
            display: flex;
            gap: 12px;
            margin: 20px 0 16px;
        }

        .botao {
            flex: 1;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: #ffffff;
            padding: 16px;
            border-radius: 40px;
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 0 #121214;
        }

        .botao:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #121214;
        }

        .botao.salvar {
            background: #30d158;
            color: #000000;
            border-color: #30d158;
        }

        .status {
            background: #1c1c1e;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid #2c2c2e;
            text-align: center;
            color: #98989e;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Controle de Excursão</h1>
        <div class="subtitulo">Gerenciamento de famílias</div>

        <div class="total-inicial">
            <span class="total-label">Total Inicial</span>
            <span class="total-valor" id="totalInicial">60</span>
        </div>

        <div class="monitora-header">
            <div class="monitora-nome">
                <strong id="nomeMonitoraDisplay">MARCIA</strong>
                <span>👤</span>
            </div>
            <div class="botao-alterar" onclick="alterarNome()">
                ✏️ Alterar
            </div>
        </div>

        <div class="tabela-header">
            <span>FAMÍLIA</span>
            <span>MEMBROS</span>
            <span>RESTANTE</span>
            <span>MONITORA</span>
        </div>

        <div class="tabela-container" id="tabelaDados">
            <!-- AS LINHAS SERÃO INSERIDAS AQUI PELO JAVASCRIPT -->
        </div>

        <div class="botoes">
            <button class="botao" onclick="carregarDados()">ATUALIZAR</button>
            <button class="botao salvar" onclick="salvarMembros()">SALVAR</button>
        </div>

        <div class="status" id="status">Pronto</div>
    </div>

    <script>
        // 🔴 COLE SUA URL DO APPS SCRIPT
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzKg5Ts6vfFrhbtnO-wNy4UtsEpTzTIliWm1V3z-Ix2wgtyUJxYHOrdY-ZklEzjYQCiKQ/exec';
        
        // =====================================================
        // NOME DA MONITORA
        // =====================================================
        let NOME_MONITORA = localStorage.getItem('monitora_nome');
        if (!NOME_MONITORA) {
            NOME_MONITORA = 'MARCIA';
            localStorage.setItem('monitora_nome', NOME_MONITORA);
        }
        document.getElementById('nomeMonitoraDisplay').textContent = NOME_MONITORA;

        function alterarNome() {
            const novoNome = prompt('Digite seu nome:', NOME_MONITORA);
            if (novoNome) {
                NOME_MONITORA = novoNome.toUpperCase();
                document.getElementById('nomeMonitoraDisplay').textContent = NOME_MONITORA;
                localStorage.setItem('monitora_nome', NOME_MONITORA);
            }
        }

        // =====================================================
        // DADOS INICIAIS (AS LINHAS QUE SUMIRAM!)
        // =====================================================
        const dadosIniciais = [
            ['Souza', 4, 56, ''],
            ['Carvalho', 2, 53, ''],
            ['Silva', 1, 52, ''],
            ['Barros', 1, 51, ''],
            ['Carvalho2', 1, 50, ''],
            ['Bezerra', 1, 49, '']
        ];

        // =====================================================
        // FUNÇÃO QUE CRIA AS LINHAS (RESPONSÁVEL POR MOSTRAR)
        // =====================================================
        function criarTabela(dados) {
            const container = document.getElementById('tabelaDados');
            container.innerHTML = ''; // LIMPA ANTES DE RECRIAR
            
            if (!dados || dados.length === 0) {
                container.innerHTML = '<div style="color:#98989e; text-align:center; padding:20px;">Nenhuma família cadastrada</div>';
                return;
            }
            
            // CRIA CADA LINHA
            dados.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'linha-tabela';
                
                div.innerHTML = `
                    <span class="familia">${item[0] || ''}</span>
                    <input type="number" class="membros-input" value="${item[1] || 0}" data-index="${index}">
                    <span class="restante">${item[2] || 0}</span>
                    <span class="monitora" id="monitora-${index}">${item[3] || ''}</span>
                `;
                
                container.appendChild(div);
            });
            
            document.getElementById('status').innerHTML = `Mostrando ${dados.length} famílias`;
            console.log('✅ Tabela criada com', dados.length, 'linhas');
        }

        // =====================================================
        // CARREGAR DADOS DA PLANILHA
        // =====================================================
        async function carregarDados() {
            document.getElementById('status').innerHTML = '🔄 Carregando...';
            
            try {
                const response = await fetch(SCRIPT_URL);
                const result = await response.json();
                
                if (result.success && result.data && result.data.length > 0) {
                    criarTabela(result.data);
                    if (result.f1) document.getElementById('totalInicial').textContent = result.f1;
                    document.getElementById('status').innerHTML = '✅ Dados da planilha';
                } else {
                    criarTabela(dadosIniciais);
                    document.getElementById('status').innerHTML = '⚠️ Usando dados locais';
                }
            } catch (error) {
                console.error('Erro:', error);
                criarTabela(dadosIniciais);
                document.getElementById('status').innerHTML = '❌ Erro de conexão';
            }
        }
// =====================================================
// 🐞 VERSÃO COM DEBUG - LINHA 3
// =====================================================
async function salvarMembros() {
    document.getElementById('status').innerHTML = `💾 Salvando...`;
    
    const dados = [];
    const linhas = document.querySelectorAll('.linha-tabela');
    
    console.log('=================================');
    console.log(`🔍 Total de linhas: ${linhas.length}`);
    console.log('=================================');
    
    // MOSTRA DETALHES DE CADA LINHA
    linhas.forEach((linha, index) => {
        const familia = linha.querySelector('.familia')?.textContent || 'NÃO ENCONTRADO';
        const inputMembros = linha.querySelector('.membros-input');
        const restante = linha.querySelector('.restante')?.textContent || '0';
        
        console.log(`\n📌 LINHA ${index + 1}:`);
        console.log(`   Família: "${familia}"`);
        console.log(`   Input encontrado: ${inputMembros ? '✅ SIM' : '❌ NÃO'}`);
        
        if (inputMembros) {
            console.log(`   Valor digitado: ${inputMembros.value}`);
            console.log(`   ID do input: ${inputMembros.id || 'sem ID'}`);
            console.log(`   Classes: ${inputMembros.className}`);
        }
        
        // SÓ ADICIONA SE TUDO OK
        if (familia !== 'NÃO ENCONTRADO' && inputMembros) {
            dados.push([
                familia,
                inputMembros.value || '0',
                restante,
                NOME_MONITORA
            ]);
            console.log(`   ✅ ADICIONADO AO ARRAY`);
        } else {
            console.log(`   ❌ NÃO ADICIONADO`);
        }
    });
    
    console.log('=================================');
    console.log('📦 DADOS A SEREM ENVIADOS:', dados);
    console.log('=================================');
    
    // VERIFICAR ESPECIFICAMENTE A LINHA 3 (índice 2)
    if (dados.length >= 3) {
        console.log('🔴 LINHA 3 (Carvalho) no array:', dados[2]);
    } else {
        console.log('🔴 LINHA 3 NÃO ESTÁ NO ARRAY!');
    }
    
    // ENVIAR
    try {
        await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                acao: 'atualizar_membros',
                dados: dados,
                monitora: NOME_MONITORA
            })
        });
        
        document.getElementById('status').innerHTML = `✅ ${NOME_MONITORA} salvou!`;
        
    } catch (error) {
        console.error('❌ Erro:', error);
        document.getElementById('status').innerHTML = '❌ Erro ao salvar';
    }
}

        // =====================================================
        // INICIAR MOSTRANDO AS LINHAS
        // =====================================================
        criarTabela(dadosIniciais); // <-- ISSO FAZ AS LINHAS APARECEREM!
    </script>
</body>
</html>
